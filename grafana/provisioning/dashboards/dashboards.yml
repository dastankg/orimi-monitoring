apiVersion: 1

# Провайдер дашбордов: Grafana при старте грузит все *.json из указанной папки
# и кладёт их в папку «orimi». Файлы монтируются в docker-compose.yml.
providers:
  - name: orimi
    orgId: 1
    folder: orimi
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false