apiVersion: 1

# Источники данных подключаются автоматически при старте Grafana.
# Фиксированные uid нужны, чтобы провижининговые дашборды ссылались на
# datasource детерминированно (см. grafana/dashboards/*.json).
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100